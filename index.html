<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NeckPac</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <main class="app-shell" aria-labelledby="app-title">
      <section class="hero">
        <p class="eyebrow">NeckPac POC</p>
        <h1 id="app-title">Exercise your neck, eat the dots.</h1>
        <p class="intro">Canvas is initialized and ready for the game loop.</p>
      </section>

      <div class="play-surface">
        <div class="canvas-frame">
          <canvas id="gameCanvas" width="672" height="672" aria-label="NeckPac game canvas"></canvas>
        </div>

        <aside class="tracking-panel" aria-labelledby="tracking-title">
          <div class="tracking-copy">
            <h2 id="tracking-title">Tracking Preview</h2>
            <p>Reserved for webcam feedback during calibration.</p>
          </div>
          <video id="trackingVideo" class="tracking-video" autoplay playsinline muted aria-label="Hidden webcam tracking preview"></video>
        </aside>
      </div>
    </main>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
